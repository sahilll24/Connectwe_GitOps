kind: Deployment
apiVersion: apps/v1
metadata:
  name: connectwe-db
  labels:
    app: connectwe-db
  namespace: connectwe-ns
spec:
  replicas: 5
  selector:
    matchLabels:
      app: connectwe-db
  template:
    metadata:
      name: connectwe-db
      labels:
        app: connectwe-db
      namespace: connectwe-ns
    spec:
      containers:
        - name: connectwe-db
          image: mongo:latest
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: 200m
              memory: 200Mi
            limits:
              cpu: 300m
              memory: 400Mi
